server:
  servlet:
    context-path: /api
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spring_forge}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        order_inserts: true
        order_updates: true
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: 'true'
          batch_size: 50
    show-sql: false
    hibernate:
      ddl-auto: update
  jackson:
    serialization:
      fail-on-empty-beans: 'false'

springdoc:
  swagger-ui:
    enabled: true
