server:
  servlet:
    context-path: /api
spring:
  jpa:
    properties:
      hibernate:
        order_inserts: true
        order_updates: true
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: 'true'
          batch_size: 50
    show-sql: false
    hibernate:
      ddl-auto: update
  jackson:
    serialization:
      fail-on-empty-beans: 'false'

springdoc:
  swagger-ui:
    enabled: true
