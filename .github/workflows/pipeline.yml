name: Pipeline

on:
  push:
    branches: [ main ]

jobs:
  javadoc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate Javadoc
        run: ./gradlew aggregateJavadoc

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/javadoc

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get added release notes
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: docs/releases/v*.md

      - name: Create Release
        if: steps.changed-files.outputs.any_added == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in ${{ steps.changed-files.outputs.added_files }}; do
            VERSION=$(basename "$file" .md)
            echo "Creating release for $VERSION"
            gh release create "$VERSION" --title "Release $VERSION" --notes-file "$file" || echo "Release $VERSION already exists"
          done
